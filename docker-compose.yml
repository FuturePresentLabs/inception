services:
  inception-registry:
    build: .
    container_name: inception-registry
    network_mode: host
    environment:
      - INCEPTION_HOST=0.0.0.0
      - INCEPTION_PORT=18080
      - INCEPTION_DATABASE_URL=sqlite:///data/inception.db
      - INCEPTION_METRICS_ENABLED=true
      - INCEPTION_METRICS_PORT=19090
      - RUST_LOG=inception_registry=debug,info
    volumes:
      - ./data:/data
      - ./certs:/certs:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
